controller_manager:
  ros__parameters:
    update_rate: 100
    
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - link1_to_link2
      - link2_to_link3
      - link3_to_link4
      - link4_to_link5
      - link5_to_link6
      - link6_to_link6flange
    
    command_interfaces:
      - position
      
    state_interfaces:
      - position
      - velocity
    
    # ADD THESE LINES:
    gains:
      link1_to_link2: {p: 100.0, d: 10.0, i: 0.01}
      link2_to_link3: {p: 100.0, d: 10.0, i: 0.01}
      link3_to_link4: {p: 100.0, d: 10.0, i: 0.01}
      link4_to_link5: {p: 100.0, d: 10.0, i: 0.01}
      link5_to_link6: {p: 100.0, d: 10.0, i: 0.01}
      link6_to_link6flange: {p: 100.0, d: 10.0, i: 0.01}
